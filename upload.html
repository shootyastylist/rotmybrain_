<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>upload — rotmybrain.com</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <a href="about.html" class="corner-link logo-topleft" title="about page" aria-label="about page">
    <img src="assets/main_logo.jpeg" alt="rotmybrain logo" />
  </a>

  <a href="upload.html" class="corner-link human-topright" title="upload meme" aria-label="upload meme">
    <img src="assets/human.jpeg" alt="pixel human" />
  </a>

  <a href="index.html" class="back-btn" aria-label="Back to home">
    <span class="arrow">&larr;</span><span>back</span>
  </a>

  <div class="center-wordmark bg">
    <img src="assets/center_text.png" alt="" />
  </div>

  <main class="page-content">
    <div class="uploader">

      <label class="drop-zone" id="dropZone">
        <span id="dropText">
          click to upload a meme &nbsp;·&nbsp; or drag &amp; drop here<br>
          <small style="font-size:12px;color:#666;">images · gifs · videos &nbsp;·&nbsp; max 10MB</small>
        </span>
        <input type="file" id="fileInput" accept="image/*,video/*,.gif" />
      </label>

      <div class="preview-box" id="previewBox">
        <span class="empty">preview will appear here</span>
      </div>

      <input type="text" class="meme-name" id="memeName" placeholder="name of meme" maxlength="80" />

      <button class="post-btn" id="postBtn" disabled>post meme</button>

      <div class="posted-msg" id="postedMsg"></div>
    </div>
  </main>

  <!-- Supabase client from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const MAX_BYTES   = 10 * 1024 * 1024; // 10 MB
    const fileInput   = document.getElementById('fileInput');
    const dropZone    = document.getElementById('dropZone');
    const dropText    = document.getElementById('dropText');
    const previewBox  = document.getElementById('previewBox');
    const memeName    = document.getElementById('memeName');
    const postBtn     = document.getElementById('postBtn');
    const postedMsg   = document.getElementById('postedMsg');

    let currentFile = null;
    let currentDataUrl = null;
    let currentKind = null; // 'image' | 'video'

    function showError(msg) {
      postedMsg.style.color = '#c0392b';
      postedMsg.textContent = msg;
      setTimeout(() => { postedMsg.textContent = ''; postedMsg.style.color = ''; }, 5000);
    }

    function showSuccess(msg) {
      postedMsg.style.color = '#1a7f1a';
      postedMsg.textContent = msg;
      setTimeout(() => { postedMsg.textContent = ''; postedMsg.style.color = ''; }, 4000);
    }

    function resetSelection() {
      currentFile = null;
      currentDataUrl = null;
      currentKind = null;
      fileInput.value = '';
      dropText.innerHTML = 'click to upload a meme &nbsp;·&nbsp; or drag &amp; drop here<br><small style="font-size:12px;color:#666;">images · gifs · videos &nbsp;·&nbsp; max 10MB</small>';
      previewBox.innerHTML = '<span class="empty">preview will appear here</span>';
      updatePostBtn();
    }

    function handleFile(file) {
      if (!file) return;

      const isImage = file.type.startsWith('image/');
      const isVideo = file.type.startsWith('video/');
      if (!isImage && !isVideo) {
        showError('only images, gifs, and videos are allowed');
        return;
      }

      if (file.size > MAX_BYTES) {
        const mb = (file.size / 1024 / 1024).toFixed(1);
        showError('file is ' + mb + 'MB — max allowed is 10MB');
        return;
      }

      currentFile = file;
      currentKind = isVideo ? 'video' : 'image';
      dropText.textContent = file.name;

      const reader = new FileReader();
      reader.onload = (e) => {
        currentDataUrl = e.target.result;
        previewBox.innerHTML = '';
        if (isVideo) {
          const vid = document.createElement('video');
          vid.src = currentDataUrl;
          vid.controls = true;
          vid.style.maxWidth = '100%';
          vid.style.maxHeight = '360px';
          previewBox.appendChild(vid);
        } else {
          const img = document.createElement('img');
          img.src = currentDataUrl;
          img.alt = 'meme preview';
          previewBox.appendChild(img);
        }
        updatePostBtn();
      };
      reader.readAsDataURL(file);
    }

    function updatePostBtn() {
      postBtn.disabled = !(currentFile && memeName.value.trim().length > 0);
    }

    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    memeName.addEventListener('input', updatePostBtn);

    // Upload to Supabase: 1) upload file to storage, 2) insert metadata row
    postBtn.addEventListener('click', async () => {
      if (postBtn.disabled) return;
      postBtn.disabled = true;
      postedMsg.style.color = '';
      postedMsg.textContent = 'uploading…';

      try {
        // Build a safe unique filename: timestamp-randomstring.ext
        const ext = (currentFile.name.split('.').pop() || 'bin').toLowerCase().replace(/[^a-z0-9]/g, '');
        const storage_path = Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext;

        // 1) Upload binary to the 'memes' storage bucket
        const { error: upErr } = await supabaseClient.storage
          .from('memes')
          .upload(storage_path, currentFile, {
            cacheControl: '3600',
            contentType: currentFile.type,
            upsert: false
          });
        if (upErr) throw upErr;

        // 2) Insert metadata row in the 'memes' table
        const { error: insErr } = await supabaseClient
          .from('memes')
          .insert({
            name: memeName.value.trim(),
            storage_path,
            kind: currentKind,
            mime_type: currentFile.type
          });
        if (insErr) throw insErr;

        showSuccess('✓ "' + memeName.value.trim() + '" posted');
        memeName.value = '';
        resetSelection();
      } catch (err) {
        console.error(err);
        showError('upload failed: ' + (err.message || 'unknown error'));
      } finally {
        updatePostBtn();
      }
    });
  </script>

</body>
</html>
